options {
    directory "/var/cache/bind";
    listen-on port 5353 { any; };
    listen-on-v6 { none; };
    recursion no;
    dnssec-validation no;
    minimal-responses no;
    max-udp-size 512;
};

zone "lab.test" {
    type master;
    file "/etc/bind/zones/lab.test.zone";
    allow-transfer { any; };
};

zone "refused.lab.test" {
    type master;
    file "/etc/bind/zones/refused.lab.test.zone";
    allow-transfer { none; };
};

zone "hijack.test" {
    type master;
    file "/etc/bind/zones/hijack.test.zone";
    allow-transfer { none; };
};

zone "nsec.lab.test" {
    type master;
    file "/var/cache/bind/nsec.lab.test.zone.signed";
    allow-transfer { none; };
};

zone "nsec3.lab.test" {
    type master;
    file "/var/cache/bind/nsec3.lab.test.zone.signed";
    allow-transfer { none; };
};
