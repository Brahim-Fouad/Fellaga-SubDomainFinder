name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  benchmark-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate benchmark scripts
        run: |
          bash -n benchmarks/run.sh
          shellcheck benchmarks/run.sh
          python3 -m py_compile benchmarks/names.py benchmarks/redact.py benchmarks/report.py benchmarks/timed.py
      - name: Run deterministic benchmark harness tests
        run: python3 -m unittest discover -s benchmarks/tests -v

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # verified master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: sudo apt-get update && sudo apt-get install -y zstd libssl-dev pkg-config
      - name: Verify embedded corpus
        run: |
          test "$(zstd -dc data/candidates-1m.txt.zst | wc -l)" -eq 1000000
          echo "cde7d80ff87e21ef2c6d3021b09931a469e4ca965f2bc7816e4c143682681d9b  data/candidates-1m.txt.zst" | sha256sum -c -
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - run: cargo test --all-targets --all-features --locked
      - run: cargo install cargo-audit --version 0.22.2 --locked && cargo audit --deny warnings
      - run: cargo build --release --locked
      - name: Smoke-test the candidate pipeline CLI
        run: |
          set -euo pipefail
          temp="$(mktemp -d)"
          trap 'rm -rf -- "$temp"' EXIT
          target/release/fellaga \
            --db "$temp/pipeline.sqlite" \
            benchmark candidate-pipeline \
            --wordlist "$temp/candidates.txt" \
            --candidates 2048 \
            --batch-size 256 \
            --concurrency 128 \
            --timeout 1 \
            --campaign-id ci-candidate-pipeline \
            --output "$temp/result.json"
          python3 - "$temp/result.json" "$temp/candidates.txt" <<'PY'
          import hashlib
          import json
          import pathlib
          import sys

          result = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          for field in (
              "requested_candidates",
              "loaded_candidates",
              "persisted_candidates",
              "scheduled_candidates",
              "dns_dispatched_candidates",
              "processed_candidates",
              "definitive_negative_candidates",
          ):
              assert result[field] == 2048, (field, result[field])
          assert result["status"] == "success"
          assert result["campaign_id"] == "ci-candidate-pipeline"
          assert result["positive_candidates"] == 0
          assert result["indeterminate_candidates"] == 0
          assert result["dns_queries"] == 4096
          assert result["loopback_queries"] == 4096
          fixture = pathlib.Path(sys.argv[2]).read_bytes()
          assert hashlib.sha256(fixture).hexdigest() == result["wordlist_sha256"]
          assert len(result["binary_sha256"]) == 64
          PY

  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # verified master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: msrv-1.95.0
      - run: cargo check --all-targets --locked

  arm64-release-build:
    name: ARM64 release build
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      TARGET: aarch64-unknown-linux-gnu
      CARGO_INCREMENTAL: "0"
      OPENSSL_STATIC: "1"
      RUSTFLAGS: "-C link-arg=-Wl,--build-id=none"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # verified master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: arm64-release-vendored-openssl
      - name: Install the ARM64 cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils build-essential cmake file gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu libc6-dev-arm64-cross perl pkg-config qemu-user-static
      - name: Configure the ARM64 cross compiler
        run: |
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
            echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar"
            echo "RANLIB_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ranlib"
          } >> "$GITHUB_ENV"
      - name: Verify the ARM64 cross sysroot
        run: |
          set -euo pipefail
          test -f /usr/aarch64-linux-gnu/include/sys/types.h
          test -f /usr/aarch64-linux-gnu/include/asm/types.h
          printf '#include <sys/types.h>\n#include <linux/random.h>\nint main(void) { return 0; }\n' | \
            aarch64-linux-gnu-gcc -x c -o "$RUNNER_TEMP/arm64-sysroot" -
          aarch64-linux-gnu-readelf -h "$RUNNER_TEMP/arm64-sysroot" | \
            grep -q 'Machine:.*AArch64'
          qemu-aarch64-static -L /usr/aarch64-linux-gnu \
            "$RUNNER_TEMP/arm64-sysroot"
      - name: Build the canonical ARM64 binary
        run: |
          cargo build \
            --release \
            --locked \
            --features vendored-openssl \
            --target "$TARGET"
      - name: Validate the ARM64 binary
        run: |
          set -euo pipefail
          binary="target/${TARGET}/release/fellaga"
          test -x "$binary"
          file "$binary" | grep -Eq 'aarch64|ARM64'
          if readelf -d "$binary" | grep -Eq 'NEEDED.*lib(ssl|crypto)\.so'; then
            echo "OpenSSL is dynamically linked despite vendored-openssl" >&2
            exit 1
          fi
          version="$(sed -n 's/^version = "\([0-9][0-9.]*\)"$/\1/p' Cargo.toml | head -n 1)"
          test -n "$version"
          qemu-aarch64-static -L /usr/aarch64-linux-gnu "$binary" --version | \
            grep -qx "fellaga ${version}"

  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # verified master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: fuzz
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz run normalize_name -- -max_total_time=20
        working-directory: fuzz

  dns-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # verified master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: dns-lab-cli
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dnsutils libssl-dev pkg-config
      - run: cargo build --locked --bin fellaga
      - run: FELLAGA_BIN=target/debug/fellaga tests/dns-lab/verify.sh
